aid: fmc-technologies
name: FMC Technologies (now TechnipFMC)
description: >-
  FMC Technologies was a Houston-based energy services and equipment company
  serving the upstream oil and gas industry, particularly subsea, surface,
  and measurement solutions for hydrocarbon production. In January 2017
  FMC Technologies completed its merger with Technip to form TechnipFMC,
  a global energy services company serving the subsea, surface, and
  offshore project markets. This repository tracks the legacy FMC
  Technologies brand and any successor APIs, developer tools, and
  machine-readable artifacts associated with the merged TechnipFMC entity.
  No public APIs or developer programs are currently published.
